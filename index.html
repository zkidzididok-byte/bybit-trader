<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S7 — USDC/USDT</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0f;color:#fff;font-family:segoe ui,arial,sans-serif;padding:10px}
        .h{background:linear-gradient(135deg,#667eea,#f093fb);padding:12px;border-radius:12px;margin-bottom:10px;text-align:center;font-size:14px}
        .s{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:10px}
        .b{background:#13131a;border-radius:10px;padding:10px;text-align:center}
        .v{font-size:18px;font-weight:700}.l{font-size:9px;color:#666}
        .g{color:#4CAF50}.r{color:#F44336}.y{color:#FFD700}
        .c{background:#13131a;border-radius:12px;padding:12px;margin-bottom:8px}
        .c h3{color:#888;font-size:12px;margin-bottom:8px}
        .p{background:#1a1a24;border-radius:8px;padding:8px;margin:4px 0;border-left:3px solid #4CAF50;font-size:11px}
        .p.SELL{border-left-color:#F44336}
        .ph{display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px}
        .ps{font-weight:700}.pi{color:#888;font-size:10px}
        .t{background:#1a1a24;border-radius:8px;padding:8px;margin:4px 0;font-size:11px}
        .th{display:flex;justify-content:space-between}
        .pb{padding:2px 8px;border-radius:10px;font-weight:700;font-size:11px}
        .pb.w{background:#4CAF5022;color:#4CAF50}.pb.loss{background:#F4433622;color:#F44336}
        .reason{font-size:9px;color:#888;margin-left:4px}
    </style>
</head>
<body>
    <div class="h">S7 | USDC/USDT | Стоп 2% | Тейк 0.5%</div>
    <div class="s">
        <div class="b"><div class="v g" id="bal">—</div><div class="l">Баланс</div></div>
        <div class="b"><div class="v" id="fl">—</div><div class="l">Плав PnL</div></div>
        <div class="b"><div class="v y" id="fp">—</div><div class="l">Закр PnL</div></div>
        <div class="b"><div class="v" id="tm">—</div><div class="l">Фандинг</div></div>
        <div class="b"><div class="v" id="tot">—</div><div class="l">Сделок</div></div>
    </div>
    <div class="c"><h3>Позиции (<span id="pc">0</span>)</h3><div id="pos"></div></div>
    <div class="c"><h3>Все сделки (<span id="tc">0</span>)</h3><div id="trd"></div></div>

    <script>
        const B = 'https://bybittradingapp-d53cf-default-rtdb.firebaseio.com/strategies/strategy_7/users/zkidz';
        
        async function update() {
            try {
                const r = await fetch(`${B}/current.json`);
                const d = await r.json();
                if (d) {
                    document.getElementById('bal').innerText = '$' + (d.balance || 1000).toFixed(2);
                    const pnl = d.floating_pnl || 0;
                    const fe = document.getElementById('fl');
                    fe.innerText = (pnl >= 0 ? '+' : '') + '$' + pnl.toFixed(2);
                    fe.className = 'v ' + (pnl >= 0 ? 'g' : 'r');
                    const profit = d.profit || 0;
                    const pe = document.getElementById('fp');
                    pe.innerText = (profit >= 0 ? '+' : '') + '$' + profit.toFixed(2);
                    pe.className = 'v ' + (profit >= 0 ? 'g' : 'r');
                    document.getElementById('tm').innerText = new Date((d.funding_timer || 0) * 1000).toISOString().substr(11, 8);
                }
                
                const s = await fetch(`${B}/stats.json`);
                const st = await s.json();
                if (st) document.getElementById('tot').innerText = st.total || 0;
                
                const p = await fetch(`${B}/open_positions.json`);
                const pos = await p.json();
                const pe = document.getElementById('pos');
                const pc = document.getElementById('pc');
                if (!pos || !Object.keys(pos).length) {
                    pe.innerHTML = '<div style="color:#666;text-align:center">Нет</div>';
                    pc.innerText = '0';
                } else {
                    const arr = Object.values(pos);
                    pc.innerText = arr.length;
                    pe.innerHTML = arr.map(p => {
                        const e = p.entry || 0, c = p.current_price || e, q = p.quantity || 0;
                        const side = p.side || 'BUY';
                        const pnl = side === 'BUY' ? (c - e) * q : (e - c) * q;
                        const sym = (p.symbol || '').replace('PERP', 'USDC');
                        const tr = p.trailing_activated ? ' 🛡' : '';
                        const tk = p.take ? ' TP:' + p.take.toFixed(4) : '';
                        return '<div class="p ' + side + '"><div class="ph"><span class="ps">' + sym + ' ' + (side === 'BUY' ? 'L' : 'S') + tr + '</span><span class="' + (pnl >= 0 ? 'g' : 'r') + '">' + (pnl >= 0 ? '+' : '') + '$' + pnl.toFixed(4) + '</span></div><div class="pi">E:$' + e.toFixed(4) + ' C:$' + c.toFixed(4) + ' S:$' + (p.stop || 0).toFixed(4) + tk + '</div></div>';
                    }).join('');
                }
                
                const t = await fetch(`${B}/trades.json`);
                const tr = await t.json();
                const te = document.getElementById('trd');
                const tc = document.getElementById('tc');
                if (!tr || !Object.keys(tr).length) {
                    te.innerHTML = '<div style="color:#666;text-align:center">Нет</div>';
                    tc.innerText = '0';
                } else {
                    const arr = Object.values(tr).reverse();
                    tc.innerText = arr.length;
                    te.innerHTML = arr.map(t => {
                        const sym = (t.symbol || '').replace('PERP', 'USDC');
                        const pnl = t.profit || 0;
                        const reason = t.reason === 'take_profit' ? '🎯' : t.reason === 'stop_loss' ? '🛑' : '';
                        return '<div class="t"><div class="th"><span><b>' + sym + '</b> ' + (t.side || '') + '<span class="reason">' + reason + '</span></span><span class="pb ' + (pnl >= 0 ? 'w' : 'loss') + '">' + (pnl >= 0 ? '+' : '') + '$' + pnl.toFixed(4) + '</span></div><div class="pi">' + (t.open_time_str || '') + ' | E:$' + (t.entry || 0).toFixed(4) + ' X:$' + (t.exit || 0).toFixed(4) + '</div></div>';
                    }).join('');
                }
            } catch (e) {}
        }
        
        update();
        setInterval(update, 300);
    </script>
</body>
</html>
