<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стратегия 7 — USDC/USDT</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0f;color:#fff;font-family:Arial;padding:20px}
        .header{background:linear-gradient(135deg,#667eea,#f093fb);padding:20px;border-radius:16px;margin-bottom:20px;text-align:center}
        .header h1{font-size:20px}
        .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
        .stat{background:#13131a;border-radius:14px;padding:16px;text-align:center}
        .val{font-size:22px;font-weight:bold;color:#4CAF50}
        .lbl{font-size:11px;color:#666;margin-top:4px}
        .card{background:#13131a;border-radius:16px;padding:20px;margin-bottom:16px}
        .card h3{color:#888;margin-bottom:12px}
        .pos{background:#1a1a24;border-radius:12px;padding:14px;margin:8px 0;border-left:4px solid #4CAF50}
        .pos.SELL{border-left-color:#F44336}
        .green{color:#4CAF50}.red{color:#F44336}
    </style>
</head>
<body>
    <div class="header"><h1>Стратегия 7 — USDC/USDT</h1></div>
    <div class="stats">
        <div class="stat"><div class="val" id="balance">—</div><div class="lbl">Баланс</div></div>
        <div class="stat"><div class="val" id="pnl">—</div><div class="lbl">Плавающий PnL</div></div>
        <div class="stat"><div class="val" id="total">—</div><div class="lbl">Сделок</div></div>
    </div>
    <div class="card"><h3>Открытые позиции</h3><div id="positions">Загрузка...</div></div>
    <div class="card"><h3>История сделок</h3><div id="trades">Загрузка...</div></div>

    <script>
        const BASE = "https://bybittradingapp-d53cf-default-rtdb.firebaseio.com";
        const uid = 'zkidz';
        const path = `strategies/strategy_7/users/${uid}`;
        
        async function fetchFB(endpoint) {
            try {
                const r = await fetch(`${BASE}/${path}/${endpoint}.json`);
                return await r.json();
            } catch(e) { return null; }
        }
        
        async function update() {
            const current = await fetchFB('current');
            if (current) {
                document.getElementById('balance').innerText = '$' + (current.balance||1000).toFixed(2);
                const pnl = current.floating_pnl || 0;
                document.getElementById('pnl').innerText = (pnl>=0?'+':'') + '$' + pnl.toFixed(4);
            }
            
            const stats = await fetchFB('stats');
            if (stats) document.getElementById('total').innerText = stats.total||0;
            
            const positions = await fetchFB('open_positions');
            const pe = document.getElementById('positions');
            if (!positions || Object.keys(positions).length===0) {
                pe.innerHTML = 'Нет позиций';
            } else {
                pe.innerHTML = Object.values(positions).map(p => {
                    const entry=p.entry||0, current=p.current_price||entry, qty=p.quantity||0;
                    const side=p.side||'BUY';
                    const pnl=side==='BUY'?(current-entry)*qty:(entry-current)*qty;
                    const sym=(p.symbol||'').replace('PERP','USDC');
                    return `<div class="pos ${side}"><b>${sym}</b> ${side} | PnL: <span class="${pnl>=0?'green':'red'}">${pnl>=0?'+':''}$${pnl.toFixed(4)}</span> | Вход: $${entry.toFixed(4)} | Тек: $${current.toFixed(4)}</div>`;
                }).join('');
            }
            
            const trades = await fetchFB('trades');
            const te = document.getElementById('trades');
            if (!trades || Object.keys(trades).length===0) {
                te.innerHTML = 'Нет сделок';
            } else {
                te.innerHTML = Object.values(trades).reverse().slice(0,30).map(t => {
                    const sym=(t.symbol||'').replace('PERP','USDC');
                    return `<div class="pos"><b>${sym}</b> ${t.side||''} | PnL: <span class="${t.profit>=0?'green':'red'}">${t.profit>=0?'+':''}$${(t.profit||0).toFixed(4)}</span> | ${t.open_time_str||''}</div>`;
                }).join('');
            }
        }
        
        update();
        setInterval(update, 2000);
    </script>
</body>
</html>
