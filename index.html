<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:#0a0e27;color:#fff;min-height:100vh}
        .container{max-width:1200px;margin:0 auto;padding:20px}
        .header{display:flex;justify-content:space-between;align-items:center;padding:20px;background:#1a1f3a;border-radius:16px;margin-bottom:20px}
        .header h1{background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .dot{width:10px;height:10px;border-radius:50%;background:#4CAF50;display:inline-block}
        .dot.off{background:#f44336}
        .balance-card{background:linear-gradient(135deg,#667eea,#764ba2);border-radius:20px;padding:25px;margin-bottom:20px}
        .balance{font-size:2.5em;font-weight:bold}
        .green{color:#4CAF50}.red{color:#f44336}
        .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
        .stat{background:#1a1f3a;border-radius:12px;padding:14px;text-align:center}
        .stat .label{font-size:.8em;opacity:.7}
        .stat .value{font-size:1.2em;font-weight:bold;margin-top:3px}
        .section{background:#1a1f3a;border-radius:16px;padding:20px;margin-bottom:20px}
        .section h2{color:#667eea;margin-bottom:12px;font-size:1.2em}
        .trade-card{background:#0d1128;border-radius:12px;padding:14px;margin-bottom:8px;border-left:4px solid #667eea}
        .trade-card.LONG{border-left-color:#4CAF50}
        .trade-card.SHORT{border-left-color:#f44336}
        .trade-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
        .trade-symbol{font-size:1.1em;font-weight:bold}
        .trade-dir{padding:3px 12px;border-radius:20px;font-weight:bold;font-size:.8em}
        .trade-dir.LONG{background:rgba(76,175,80,.2);color:#4CAF50}
        .trade-dir.SHORT{background:rgba(244,67,54,.2);color:#f44336}
        .trade-info{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;font-size:.9em}
        .trade-info .lbl{font-size:.7em;opacity:.7}
        .trade-info .val{font-weight:bold}
        table{width:100%;border-collapse:collapse;font-size:.85em}
        th{background:#0d1128;padding:8px;text-align:left;color:#667eea}
        td{padding:8px;border-bottom:1px solid #2a2f4a}
        .badge{padding:2px 8px;border-radius:12px;font-size:.75em;font-weight:bold}
        .badge.LONG{background:rgba(76,175,80,.2);color:#4CAF50}
        .badge.SHORT{background:rgba(244,67,54,.2);color:#f44336}
        .badge.STOP_LOSS{background:rgba(255,152,0,.2);color:#ff9800}
        .badge.TRAILING_STOP{background:rgba(0,188,212,.2);color:#00bcd4}
        .badge.LIQUIDATED{background:rgba(244,67,54,.3);color:#f44336}
        .badge.CLOSED{background:rgba(76,175,80,.2);color:#4CAF50}
        .empty{text-align:center;padding:20px;opacity:.5}
        .liq-signal{background:rgba(255,152,0,.15);border:1px solid #ff9800;border-radius:8px;padding:10px;margin-bottom:10px;font-size:.85em}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Auto Trading Bot</h1>
            <div><span class="dot" id="dot"></span> <span id="statusText">Загрузка...</span></div>
        </div>
        <div class="balance-card">
            <div class="balance" id="balance">$1,000</div>
            <div id="pnlInfo"></div>
        </div>
        <div class="stats">
            <div class="stat"><div class="label">Доступно</div><div class="value" id="available">$1,000</div></div>
            <div class="stat"><div class="label">Открыто</div><div class="value" id="openCount">0</div></div>
            <div class="stat"><div class="label">Всего сделок</div><div class="value" id="totalTrades">0</div></div>
            <div class="stat"><div class="label">Win Rate</div><div class="value" id="winRate">0%</div></div>
        </div>
        <div id="liqSignals"></div>
        <div class="section"><h2>📈 Открытые сделки</h2><div id="openTrades"><div class="empty">Нет открытых сделок</div></div></div>
        <div class="section"><h2>📋 История сделок</h2><table><thead><tr><th>Время</th><th>Монета</th><th>Плечо</th><th>Напр.</th><th>Вход</th><th>Выход</th><th>P&L $</th><th>P&L %</th><th>Статус</th></tr></thead><tbody id="history"></tbody></table></div>
    </div>
    <script>
        firebase.initializeApp({
            apiKey:"AIzaSyDn3khNbagwGPKSkup5nv12H9n6q8mvv9g",
            authDomain:"market-sim-350b1.firebaseapp.com",
            projectId:"market-sim-350b1",
            storageBucket:"market-sim-350b1.firebasestorage.app",
            messagingSenderId:"259052430410",
            appId:"1:259052430410:web:132cff02cf988294d032b3"
        });
        const db=firebase.firestore();
        
        // Сигналы ликвидаций
        ['BTCUSDT','ETHUSDT','SOLUSDT'].forEach(s=>{
            db.collection('market_state').doc(s).onSnapshot(d=>{
                if(d.exists&&d.data().last_liquidation){
                    const l=d.data().last_liquidation;
                    document.getElementById('liqSignals').innerHTML='<div class="liq-signal">⚡ Ликвидация '+s+': '+l.side+' $'+(l.price||0).toFixed(2)+' x '+l.quantity.toFixed(4)+'</div>';
                }
            });
        });
        
        // Трейдинг
        db.collection('trading_state').doc('current').onSnapshot(d=>{
            if(d.exists){
                const x=d.data();
                document.getElementById('balance').textContent='$'+(x.balance||0).toFixed(2);
                document.getElementById('available').textContent='$'+(x.available_balance||0).toFixed(2);
                document.getElementById('openCount').textContent=x.open_count||0;
                document.getElementById('totalTrades').textContent=x.total_trades||0;
                const w=(x.closed_trades||[]).filter(t=>t.pnl>0).length;
                document.getElementById('winRate').textContent=((w/(x.total_trades||1))*100).toFixed(1)+'%';
                const pnl=(x.balance||0)-1000;
                document.getElementById('pnlInfo').innerHTML='<span class="'+(pnl>=0?'green':'red')+'">'+(pnl>=0?'+':'')+'$'+pnl.toFixed(2)+' ('+((pnl/1000)*100).toFixed(2)+'%)</span>';
                
                const ot=document.getElementById('openTrades');
                if(!x.open_trades||!x.open_trades.length) ot.innerHTML='<div class="empty">Нет открытых сделок</div>';
                else ot.innerHTML=x.open_trades.map(t=>'<div class="trade-card '+t.direction+'"><div class="trade-top"><span class="trade-symbol">'+t.symbol+'</span><span class="trade-dir '+t.direction+'">'+t.direction+' x'+t.leverage+'</span></div><div class="trade-info"><span><span class="lbl">Вход</span><span class="val">$'+(t.entry_price||0).toFixed(2)+'</span></span><span><span class="lbl">Текущая</span><span class="val">$'+(t.current_price||0).toFixed(2)+'</span></span><span><span class="lbl">Стоп</span><span class="val" style="color:#ff9800">$'+(t.stop_loss||0).toFixed(2)+'</span></span><span><span class="lbl">P&L</span><span class="val '+(t.pnl>=0?'green':'red')+'">'+(t.pnl>=0?'+':'')+'$'+(t.pnl||0).toFixed(2)+' ('+(t.pnl_percent||0).toFixed(2)+'%)</span></span></div></div>').join('');
                
                const hd=document.getElementById('history');
                if(!x.closed_trades||!x.closed_trades.length) hd.innerHTML='<tr><td colspan="9" class="empty">Нет сделок</td></tr>';
                else hd.innerHTML=x.closed_trades.map(t=>'<tr><td>'+new Date(t.close_time).toLocaleString()+'</td><td><b>'+t.symbol+'</b></td><td>x'+t.leverage+'</td><td><span class="badge '+t.direction+'">'+t.direction+'</span></td><td>$'+(t.entry_price||0).toFixed(2)+'</td><td>$'+(t.exit_price||0).toFixed(2)+'</td><td class="'+(t.pnl>=0?'green':'red')+'">'+(t.pnl>=0?'+':'')+'$'+(t.pnl||0).toFixed(2)+'</td><td class="'+(t.pnl_percent>=0?'green':'red')+'">'+(t.pnl_percent>=0?'+':'')+(t.pnl_percent||0).toFixed(2)+'%</td><td><span class="badge '+t.status+'">'+t.status+'</span></td></tr>').join('');
                
                document.getElementById('dot').classList.remove('off');
                document.getElementById('statusText').textContent='Онлайн';
            }
        },()=>{
            document.getElementById('dot').classList.add('off');
            document.getElementById('statusText').textContent='Офлайн';
        });
    </script>
</body>
</html>
