<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стратегия 1</title>
    <style>
        body { background: #0a0a0f; color: #fff; font-family: Arial; padding: 20px; }
        .card { background: #13131a; padding: 20px; border-radius: 16px; margin: 10px 0; }
        .green { color: #4CAF50; } .red { color: #F44336; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
</head>
<body>
    <h2>📊 Стратегия 1</h2>
    <div class="card">
        <h3>Баланс: $<span id="balance">—</span></h3>
        <p>Сделок: <span id="total">—</span></p>
        <p>Win Rate: <span id="winrate">—</span></p>
    </div>
    <div class="card">
        <h3>Позиции</h3>
        <div id="positions"></div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://bybittradingapp-d53cf-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const uid = 'zkidz';
        const path = 'strategies/strategy_1/users/' + uid;

        db.ref(path + '/current').on('value', snap => {
            const d = snap.val();
            if (d) document.getElementById('balance').innerText = (d.balance || 0).toFixed(2);
        });
        db.ref(path + '/stats').on('value', snap => {
            const d = snap.val();
            if (d) {
                document.getElementById('total').innerText = d.total || 0;
                document.getElementById('winrate').innerText = (d.win_rate || 0).toFixed(1) + '%';
            }
        });
        db.ref(path + '/open_positions').on('value', snap => {
            const d = snap.val();
            const el = document.getElementById('positions');
            if (!d) { el.innerHTML = 'Нет позиций'; return; }
            el.innerHTML = Object.values(d).map(p => 
                `<p>${p.symbol} ${p.side} вход: $${p.entry?.toFixed(4)}</p>`
            ).join('');
        });
    </script>
</body>
</html>
