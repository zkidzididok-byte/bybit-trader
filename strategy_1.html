<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Стратегия 1</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #06060d; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 16px; padding-bottom: 80px; }
        .header { background: #0f0f1a; border-radius: 20px; padding: 18px; margin-bottom: 12px; text-align: center; border: 1px solid #1a1a2e; }
        .title { font-size: 17px; font-weight: 700; }
        .sub { font-size: 11px; color: #888; margin-top: 4px; }
        .nav { display: flex; gap: 4px; margin-bottom: 12px; background: #0f0f1a; padding: 4px; border-radius: 40px; }
        .nav a { flex: 1; padding: 10px 0; text-align: center; color: #666; text-decoration: none; font-size: 11px; font-weight: 600; border-radius: 40px; }
        .nav a.active { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
        .card { background: #0f0f1a; border-radius: 16px; padding: 16px; margin-bottom: 10px; border: 1px solid #1a1a2e; }
        .balance { font-size: 34px; font-weight: 800; background: linear-gradient(135deg, #4CAF50, #8BC34A); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 12px 0; text-align: center; }
        .stat-val { font-size: 18px; font-weight: 700; }
        .stat-lbl { font-size: 9px; color: #666; margin-top: 2px; }
        .green { color: #4CAF50; } .red { color: #F44336; }
        .pos-card { background: #13132a; border-radius: 12px; padding: 12px; margin-bottom: 8px; border-left: 3px solid; }
        .pos-card.BUY { border-color: #4CAF50; } .pos-card.SELL { border-color: #F44336; }
        .pos-row { display: flex; justify-content: space-between; align-items: center; }
        .sym { font-size: 15px; font-weight: 700; }
        .side-badge { font-size: 10px; padding: 3px 8px; border-radius: 20px; font-weight: 600; }
        .side-badge.BUY { background: #4CAF5033; color: #4CAF50; } .side-badge.SELL { background: #F4433633; color: #F44336; }
        .trade-item { background: #13132a; border-radius: 10px; padding: 10px; margin-bottom: 6px; }
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: #0f0f1a; padding: 8px; border-top: 1px solid #1a1a2e; text-align: center; font-size: 10px; color: #4CAF50; }
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 12px; color: #aaa; margin-top: 6px; }
        .user-info { background: #667eea22; color: #667eea; padding: 6px 12px; border-radius: 20px; font-size: 12px; text-align: center; margin-bottom: 12px; }
        .user-info a { color: #F44336; text-decoration: none; margin-left: 8px; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
</head>
<body>

<div class="header"><div class="title">📌 СТРАТЕГИЯ 1</div><div class="sub">Все ликвидации > $1 000 · Стоп -1%</div></div>

<div class="user-info">👤 <span id="userDisplay">—</span> <a href="index.html">выйти</a></div>

<div class="nav">
    <a href="strategy_1.html" class="active">S1</a><a href="strategy_2.html">S2</a><a href="strategy_3.html">S3</a><a href="strategy_4.html">S4</a><a href="strategy_5.html">S5</a>
</div>

<div id="noUser" style="text-align:center;padding:40px;color:#666;">Вернитесь на <a href="index.html" style="color:#667eea;">главную</a> и введите ID</div>

<div id="main" style="display:none">
    <div class="card">
        <div class="label">БАЛАНС</div>
        <div class="balance">$<span id="bal">0</span></div>
        <div class="row-2"><span>Свободно: $<span id="free">0</span></span><span>Прибыль: <span id="prof">$0</span></span></div>
    </div>
    <div class="stats"><div><div class="stat-val" id="tot">0</div><div class="stat-lbl">СДЕЛОК</div></div><div><div class="stat-val" id="wr">0%</div><div class="stat-lbl">WIN RATE</div></div><div><div class="stat-val green" id="wins">0</div><div class="stat-lbl">✅ WINS</div></div><div><div class="stat-val red" id="loss">0</div><div class="stat-lbl">❌ LOSSES</div></div></div>
    <div class="card"><div class="label" style="margin-bottom:8px;">📌 ПОЗИЦИИ (<span id="pc">0</span>)</div><div id="pos"></div></div>
    <div class="card"><div class="label" style="margin-bottom:8px;">📋 ИСТОРИЯ</div><div id="tr"></div></div>
</div>

<div class="footer">🟢 S1 · <span id="time">—</span></div>

<script>
    const uid = localStorage.getItem('okx_trader_uid') || '';
    
    if (!uid) {
        document.getElementById('noUser').style.display = 'block';
    } else {
        document.getElementById('noUser').style.display = 'none';
        document.getElementById('main').style.display = 'block';
        document.getElementById('userDisplay').innerText = uid;
        
        firebase.initializeApp({databaseURL:"https://bybittradingapp-d53cf-default-rtdb.firebaseio.com"});
        const db = firebase.database();
        const S = "strategy_1";
        const base = `strategies/${S}/users/${uid}`;
        
        db.ref(base+'/current').on('value', s => {
            const d = s.val() || {};
            document.getElementById('bal').innerText = (d.balance||0).toFixed(2);
            document.getElementById('free').innerText = (d.free||0).toFixed(2);
            document.getElementById('prof').innerText = ((d.profit||0)>=0?'+':'')+'$'+(d.profit||0).toFixed(2);
        });
        
        db.ref(base+'/stats').on('value', s => {
            const d = s.val() || {};
            document.getElementById('tot').innerText = d.total||0;
            document.getElementById('wr').innerText = (d.win_rate||0).toFixed(1)+'%';
            document.getElementById('wins').innerText = d.wins||0;
            document.getElementById('loss').innerText = d.losses||0;
        });
        
        db.ref(base+'/open_positions').on('value', s => {
            const d = s.val();
            const arr = d ? Object.values(d) : [];
            document.getElementById('pc').innerText = arr.length;
            document.getElementById('pos').innerHTML = arr.length
                ? arr.map(p => `<div class="pos-card ${p.side}"><div class="pos-row"><span class="sym">${p.symbol}</span><span class="side-badge ${p.side}">${p.side}</span></div><div class="row-2"><span>Вход: $${(p.entry||0).toFixed(6)}</span><span>Стоп: $${(p.stop||0).toFixed(6)}</span><span>Тек: $${(p.current_price||0).toFixed(6)}</span><span>Объём: $${(p.position_usdt||0).toFixed(2)}</span></div></div>`).join('')
                : '<div style="color:#666;text-align:center;padding:16px;">Нет позиций</div>';
        });
        
        db.ref(base+'/trades').limitToLast(30).on('value', s => {
            const d = s.val();
            const arr = d ? Object.values(d).reverse() : [];
            document.getElementById('tr').innerHTML = arr.length
                ? arr.map(t => `<div class="trade-item"><div class="pos-row"><span>${t.symbol} ${t.side}</span><span class="${t.profit>=0?'green':'red'}" style="font-weight:700">${(t.profit||0)>=0?'+':''}$${(t.profit||0).toFixed(4)}</span></div><div style="font-size:10px;color:#666;margin-top:4px;">${(t.entry||0).toFixed(4)} → ${(t.exit||0).toFixed(4)} · ${t.reason}</div></div>`).join('')
                : '<div style="color:#666;text-align:center;padding:16px;">Нет сделок</div>';
        });
    }
    
    setInterval(() => { document.getElementById('time').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
